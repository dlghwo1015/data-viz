<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; padding: 10px 16px; }
h1 { text-align: center; font-size: 1.45em; color: var(--h1-color); letter-spacing: 2px; font-weight: 300; margin-bottom: 4px; }
.meta { text-align: center; font-size: 0.7em; color: var(--meta-color); margin-bottom: 6px; }
.meta span { color: var(--meta-span); }
.live-row { display: flex; justify-content: center; gap: 10px; align-items: center; margin-bottom: 4px; flex-wrap: wrap; }
.live-btn { padding: 6px 18px; border-radius: 20px; border: 1px solid #cc3333; background: #1a1010; color: #ff8888; cursor: pointer; font-size: 0.75em; transition: all 0.2s; }
.live-btn:hover:not(:disabled) { background: #2a1515; border-color: #ff5555; color: #ffaaaa; }
.live-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.live-status { text-align: center; font-size: 0.67em; min-height: 18px; margin-bottom: 4px; color: var(--meta-color); }
.live-status.ok { color: #44aa66; }
.live-status.err { color: #aa4444; }
.legend { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 5px; font-size: 0.7em; color: var(--legend-color); }
.grad-bar { width: 180px; height: 10px; border-radius: 5px; background: linear-gradient(to right, #ff5050, #aa1a1a, #2a2a38, #0d7530, #26e870); }
#chart { width: 100%; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
svg { display: block; }
.node { cursor: pointer; }
.node rect { shape-rendering: crispEdges; }
.node:hover rect { filter: brightness(1.4) saturate(1.15); }
.tip { position: fixed; background: var(--tip-bg); border: 1px solid var(--tip-border); border-radius: 8px; padding: 12px 16px; font-size: 0.8em; pointer-events: none; z-index: 100; max-width: 250px; display: none; }
.tip .t-sym { font-size: 1.3em; font-weight: 700; margin-bottom: 3px; }
.tip .t-name { color: var(--tip-td); margin-bottom: 8px; font-size: 0.9em; }
.tip table { border-collapse: collapse; width: 100%; }
.tip td { padding: 2px 0; color: var(--tip-td); }
.tip td:last-child { color: var(--tip-td2); text-align: right; }
.up { color: #26e870 !important; }
.dn { color: #ff5050 !important; }
.sector-legend { display: flex; flex-wrap: wrap; gap: 5px 14px; justify-content: center; margin-bottom: 5px; font-size: 0.68em; }
.sl { display: flex; align-items: center; gap: 4px; color: var(--text2); }
.sl-box { width: 10px; height: 10px; border-radius: 2px; }

/* ===== Day / Night Theme ===== */
:root {
  --bg: #0a0a14;
  --bg2: #1a1a2a;
  --bg3: #2a2a4a;
  --text: #e0e0f0;

  --api-color: #445;

}
body.light {

}
/* Theme toggle button */
#theme-toggle {
  position: fixed; top: 12px; right: 12px; z-index: 200;
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); border-radius: 50%; width: 36px; height: 36px;

<script>
// ===== Day / Night Theme =====
(function() {
  function detectTheme() {
    const h = new Date().getHours();
    return (h >= 6 && h < 18) ? 'light' : 'dark';
  }
  function applyTheme(mode) {
    if (mode === 'light') {
      document.body.classList.add('light');
      const btn_t = document.getElementById('theme-toggle'); if(btn_t) btn_t.textContent = '🌙';
    } else {
      document.body.classList.remove('light');
      const btn_t = document.getElementById('theme-toggle'); if(btn_t) btn_t.textContent = '☀️';
    }
    window._currentTheme = mode;
    // re-render SVG background if chart already drawn
    const svgBg = getComputedStyle(document.documentElement).getPropertyValue('--svg-bg').trim();
    const svgEl = document.querySelector('#chart svg');
    if (svgEl) svgEl.style.background = svgBg;
  }
  window._applyTheme = applyTheme;
  window._detectTheme = detectTheme;
  // Initial apply
  applyTheme(detectTheme());
  // Auto-check every 60s
  setInterval(function() {
    const newMode = detectTheme();
    if (newMode !== window._currentTheme) applyTheme(newMode);
  }, 60000);
})();

function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return ((s >>> 0) / 0xffffffff) * 2 - 1;
  };
}

function pctColor(chg) {
  if (chg >= 5) return '#26e870';
  if (chg >= 3) return '#1dc455';
  if (chg >= 1.5) return '#13993c';
  if (chg >= 0.5) return '#0d7530';
  if (chg >= -0.5) return '#2a2a38';
  if (chg >= -1.5) return '#aa1a1a';
  if (chg >= -3) return '#cc2828';
  if (chg >= -5) return '#ee3838';
  return '#ff5050';
}

const r1 = seededRand(20250501);
const kospiData = kospiRaw.map(([t,n,s,c]) => ({
  ticker: t, name: n, sector: s,
  cap: c,          // 조원 단위 (트리맵 크기 비교용)
  capKRW: c,       // 조원 단위 (툴팁 표시용)
  chg: parseFloat((r1()*4.5 - 0.3).toFixed(2)),
  price: null
}));

const sectorColorMap = {
  '반도체/IT':'#1a3550','자동차':'#503020','인터넷/플랫폼':'#1a2a50',
  '배터리':'#2a4520','헬스케어/바이오':'#1a5030','금융':'#50401a',
  '화학/소재':'#303a20','에너지/화학':'#50300a','운송':'#2a2a50',
  '통신':'#1a3a50','조선':'#2a3a4a','IT서비스':'#201a50',
  '철강/소재':'#3a3a2a','게임/엔터':'#4a1a4a','지주/복합':'#3a2a1a',
  '소비재':'#4a2a2a','건설':'#3a3a20','유틸리티':'#1a4040',
  '방산/항공':'#2a3050','보험/금융':'#504020','식품/소비재':'#3a2010',
  '유통/소비재':'#3a201a','가전/전자':'#1a2a40',
};

function getSectorColor(s) { return sectorColorMap[s] || '#1a2a2a'; }

function buildSectorLegend() {
  const sectors = [...new Set(kospiData.map(d => d.sector))];
  document.getElementById('sector-legend').innerHTML = sectors.map(s =>
    `<div class="sl"><div class="sl-box" style="background:${getSectorColor(s)}"></div>${s}</div>`
  ).join('');
}

function renderChart() {
  const container = document.getElementById('chart');
  container.innerHTML = '';
  const W = container.clientWidth || window.innerWidth - 32;
  const headerH = document.getElementById('chart').getBoundingClientRect().top; const H = Math.max(460, window.innerHeight - headerH - 14);

  const sectors = [...new Set(kospiData.map(d => d.sector))];
  const hierData = {
    name: 'root',
    children: sectors.map(s => ({
      name: s,
      children: kospiData.filter(d => d.sector === s).sort((a,b) => b.cap - a.cap)
    }))
  };

  const root = d3.hierarchy(hierData)
    .sum(d => d.children ? 0 : Math.max(d.cap, 0.1))
    .sort((a,b) => b.value - a.value);

  d3.treemap().size([W, H]).paddingOuter(3).paddingTop(17).paddingInner(1).round(true)(root);

  const svg = d3.select('#chart').append('svg')
    .attr('width', W).attr('height', H)
    .style('background', getComputedStyle(document.documentElement).getPropertyValue('--svg-bg').trim());

  const defs = svg.append('defs');
  const f = defs.append('filter').attr('id','tshadow').attr('x','-5%').attr('y','-5%').attr('width','110%').attr('height','110%');
  f.append('feDropShadow').attr('dx',0).attr('dy',0).attr('stdDeviation',1.2).attr('flood-color','#000').attr('flood-opacity',0.8);

  (root.children || []).forEach(sec => {
    const bg = getSectorColor(sec.data.name);
    const sw = sec.x1-sec.x0, sh = sec.y1-sec.y0;
    svg.append('rect').attr('x',sec.x0).attr('y',sec.y0).attr('width',sw).attr('height',sh).attr('fill',bg);
    svg.append('rect').attr('x',sec.x0).attr('y',sec.y0).attr('width',sw).attr('height',16).attr('fill','rgba(0,0,0,0.4)');
    svg.append('text')
      .attr('x',sec.x0+sw/2).attr('y',sec.y0+8)
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('font-size','10px').attr('font-weight','600').attr('fill','rgba(255,255,255,0.65)')
      .attr('pointer-events','none').text(sec.data.name.toUpperCase());
  });

  const cell = svg.selectAll('.node').data(root.leaves()).enter().append('g')
    .attr('class','node').attr('transform', d => `translate(${d.x0},${d.y0})`);

  cell.append('rect')
    .attr('width', d => Math.max(0, d.x1-d.x0))
    .attr('height', d => Math.max(0, d.y1-d.y0))
    .attr('fill', d => pctColor(d.data.chg))
    .on('mousemove', function(event, d) {
      const tip = document.getElementById('tip');
      const sign = d.data.chg >= 0 ? '+' : '';
      const cls = d.data.chg >= 0 ? 'up' : 'dn';
      tip.innerHTML = `
        <div class="t-sym">${d.data.ticker}</div>
        <div class="t-name">${d.data.name}</div>
        <table>
          <tr><td>섹터</td><td>${d.data.sector}</td></tr>
          <tr><td>시가총액</td><td>~₩${d.data.capKRW.toFixed(0)}조원</td></tr>
          <tr><td>현재가</td><td>${d.data.price != null ? '₩' + d.data.price.toLocaleString() : '—'}</td></tr>
          <tr><td>등락률</td><td class="${cls}" style="font-weight:700">${sign}${d.data.chg}%</td></tr>
        </table>
        <div style="margin-top:8px;font-size:0.75em;color:#556;text-align:center;">🔗 클릭 → Yahoo Finance</div>`;
      tip.style.display = 'block';
      const x = Math.min(event.clientX+14, window.innerWidth-260);
      const y = Math.min(event.clientY-14, window.innerHeight-150);
      tip.style.left = x+'px'; tip.style.top = y+'px';
    })
    .on('mouseleave', () => { document.getElementById('tip').style.display = 'none'; })
    .on('click', function(event, d) {
      event.stopPropagation();
      const ticker = d.data.ticker.padStart(6,'0') + '.KS';
      window.open('https://finance.yahoo.com/quote/' + ticker, '_blank');
    })
    .style('cursor','pointer');

  cell.each(function(d) {
    const w = d.x1-d.x0, h = d.y1-d.y0;
    if (w < 20 || h < 14) return;
    const g = d3.select(this);
    const fs = Math.min(Math.max(Math.min(w,h)*0.22, 8), 14);
    const cy = h/2;
    const cid = `ck${d.data.ticker}`;
    g.append('clipPath').attr('id',cid).append('rect').attr('width',w).attr('height',h);

    if (w >= 35 && h >= 26) {
      g.append('text').attr('x',w/2).attr('y', h>=38 ? cy-6 : cy)
        .attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('font-size',fs).attr('font-weight','700').attr('fill','rgba(255,255,255,0.95)')
        .attr('pointer-events','none').attr('clip-path',`url(#${cid})`).attr('filter','url(#tshadow)')
        .text(d.data.name.slice(0,4));
      if (h >= 38) {
        const sign = d.data.chg >= 0 ? '+' : '';
        g.append('text').attr('x',w/2).attr('y',cy+7)
          .attr('text-anchor','middle').attr('dominant-baseline','middle')
          .attr('font-size', Math.min(fs*0.78,10)).attr('fill','rgba(255,255,255,0.72)')
          .attr('pointer-events','none').attr('clip-path',`url(#${cid})`).attr('filter','url(#tshadow)')
          .text(`${sign}${d.data.chg}%`);
      }
    } else {
      g.append('text').attr('x',w/2).attr('y',cy)
        .attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('font-size', Math.min(fs*0.85,10)).attr('font-weight','700').attr('fill','rgba(255,255,255,0.9)')
        .attr('pointer-events','none').attr('clip-path',`url(#${cid})`)
        .text(d.data.name.slice(0,2));
    }
  });
}

async function loadLiveData() {
  const btn    = document.getElementById('live-btn');
  const status = document.getElementById('live-status');
  btn.disabled = true;
  btn.textContent = '🔃 로딩 중...';
  status.className = 'live-status';
  status.textContent = '📡 데이터를 가져오는 중...';

  try {
    let liveData = null;
    let source = '';
    try {
      const r = await fetch('kospi_live.json?_=' + Date.now());
      if (r.ok) {
        const j = await r.json();
        const ageMin = (Date.now()/1000 - j.ts) / 60;
        if (ageMin < 90) { liveData = j.data; source = `캐시 (${Math.round(ageMin)}분 전)`; }
      }
    } catch(e) {}

    if (!liveData) {
      const BATCH = 20;
      const tmpCache = {};
      let ok = 0;
      const syms = kospiData.map(d => d.ticker + '.KS');
      for (let i = 0; i < syms.length; i += BATCH) {
        const batch = syms.slice(i, i + BATCH);
        const url = `https://query1.finance.yahoo.com/v8/finance/spark?symbols=${batch.join(',')}&range=1d&interval=1d`;
        try {
          const resp = await fetch(url);
          if (resp.ok) {
            const j = await resp.json();
            for (const [sym, info] of Object.entries(j)) {
              const closes = info.close || [];
              const price = closes[closes.length - 1] ?? null;
              const prev  = info.chartPreviousClose ?? null;
              const chg   = (price && prev) ? parseFloat(((price-prev)/prev*100).toFixed(2)) : null;
              tmpCache[sym] = { price, chg };
              ok++;
            }
          }
        } catch(e) {}
        if (i + BATCH < syms.length) await new Promise(r => setTimeout(r, 300));
      }
      if (ok > 0) { liveData = tmpCache; source = 'Yahoo Finance 실시간'; }
    }

    if (!liveData || Object.keys(liveData).length === 0) throw new Error('데이터를 가져올 수 없습니다');

    kospiData.forEach(d => {
      const live = liveData[d.ticker + '.KS'] || liveData[d.ticker];
      if (live) {
        if (live.chg   != null) d.chg   = live.chg;
        if (live.price != null) d.price = live.price;
      }
    });

    renderChart();
    const now = new Date().toLocaleTimeString('ko-KR');
    status.className = 'live-status ok';
    status.textContent = `✅ ${now} 기준 (${source}) · ${Object.keys(liveData).length}개 종목`;
    btn.textContent = '🔄 새로고침';
  } catch (err) {
    status.className = 'live-status err';
    status.textContent = `⚠️ 로드 실패: ${err.message}`;
    btn.textContent = '🔴 재시도';
  }
  btn.disabled = false;
}

buildSectorLegend();
renderChart();
window.addEventListener('resize', renderChart);
renderChart();
loadLiveData();
</script>
</body>
</html>
