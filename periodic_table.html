<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인터랙티브 주기율표</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d1f; color: #e8e8ff; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; padding: 16px; min-height: 100vh; }
h1 { text-align: center; font-size: 1.6em; margin-bottom: 4px; color: #c8c8ff; letter-spacing: 3px; font-weight: 300; }
.subtitle { text-align: center; font-size: 0.75em; color: #666; margin-bottom: 14px; letter-spacing: 1px; }
.table-wrap { overflow-x: auto; }
.pt-grid {
  display: grid;
  grid-template-columns: repeat(18, minmax(52px, 1fr));
  grid-template-rows: repeat(10, auto);
  gap: 2px;
  min-width: 960px;
}
.el {
  border-radius: 4px;
  padding: 3px 2px 4px;
  cursor: pointer;
  text-align: center;
  transition: transform 0.15s, box-shadow 0.15s;
  border: 1px solid transparent;
  position: relative;
  user-select: none;
}
.el:hover {
  transform: scale(1.25);
  z-index: 20;
  border-color: rgba(255,255,255,0.6);
  box-shadow: 0 0 16px rgba(255,255,255,0.25);
}
.el .z { font-size: 0.52em; color: rgba(255,255,255,0.65); line-height: 1.4; }
.el .sym { font-size: 1.05em; font-weight: 700; line-height: 1.15; }
.el .nm { font-size: 0.43em; color: rgba(255,255,255,0.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.el .ms { font-size: 0.42em; color: rgba(255,255,255,0.55); }
.placeholder { border: 1px dashed #2a2a4a; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.6em; color: #44446a; }
.gap-row { grid-column: 1/-1; height: 6px; }
.series-label { grid-column: 1/4; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-size: 0.55em; color: #55557a; font-style: italic; }

/* Category colors */
.alkali     { background: #7a1f1f; }
.alkaline   { background: #7a4a0a; }
.trans      { background: #1a3d5c; }
.post       { background: #1a4a3a; }
.metalloid  { background: #2d4a1a; }
.nonmetal   { background: #1a2a5c; }
.halogen    { background: #4a1a5c; }
.noble      { background: #1a4a55; }
.lanthanide { background: #3d1a5c; }
.actinide   { background: #4a2a0a; }
.unknown-cat{ background: #2a2a3a; }

/* Legend */
.legend { display: flex; flex-wrap: wrap; gap: 6px 12px; margin: 14px 0 10px; justify-content: center; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 0.72em; color: #aaa; }
.leg-box { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }

/* Modal */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; }
.overlay.show { display: flex; }
.modal {
  background: #13132a;
  border: 1px solid #333;
  border-radius: 14px;
  padding: 28px;
  max-width: 420px;
  width: 92%;
  position: relative;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity:0; transform: scale(0.9); } to { opacity:1; transform: scale(1); } }
.modal-close { position: absolute; top: 14px; right: 18px; cursor: pointer; font-size: 1.4em; color: #666; line-height: 1; }
.modal-close:hover { color: #fff; }
.m-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
.m-sym-box { width: 72px; height: 72px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
.m-sym-box .z { font-size: 0.75em; color: rgba(255,255,255,0.65); }
.m-sym-box .sym { font-size: 2em; font-weight: 700; }
.m-sym-box .ms { font-size: 0.65em; color: rgba(255,255,255,0.6); }
.m-info h2 { font-size: 1.3em; font-weight: 600; }
.m-info .en { font-size: 0.85em; color: #888; margin-bottom: 4px; }
.m-info .cat-label { font-size: 0.72em; padding: 2px 8px; border-radius: 10px; display: inline-block; }
.m-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
.m-prop { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 10px; }
.m-prop .pl { font-size: 0.65em; color: #777; margin-bottom: 2px; }
.m-prop .pv { font-size: 0.92em; font-weight: 500; }
.m-desc { margin-top: 14px; font-size: 0.82em; color: #999; line-height: 1.55; background: rgba(255,255,255,0.03); border-radius: 8px; padding: 10px; }

/* State indicator */
.state-solid   { color: #aad4ff; }
.state-liquid  { color: #aaffcc; }
.state-gas     { color: #ffddaa; }
.state-unknown { color: #888; }
</style>
</head>

// Map: Z -> element
const elMap = {};
E.forEach(e => elMap[e[0]] = e);

function catClass(cat) {
  const map = { nonmetal:'nonmetal', noble:'noble', alkali:'alkali', alkaline:'alkaline',
    trans:'trans', post:'post', metalloid:'metalloid', halogen:'halogen',
    lanthanide:'lanthanide', actinide:'actinide', 'unknown-cat':'unknown-cat' };
  return map[cat] || 'unknown-cat';
}

function makeEl(el, row, col) {
  const [z, sym, nm, en, mass, cat, grp, per, eneg, melt, boil, state, desc] = el;
  const div = document.createElement('div');
  div.className = `el ${catClass(cat)}`;
  div.style.gridColumn = col;
  div.style.gridRow = row;
  div.innerHTML = `<div class="z">${z}</div><div class="sym">${sym}</div><div class="nm">${nm}</div><div class="ms">${mass}</div>`;
  div.addEventListener('click', () => showModal(el));
  return div;
}

function showModal(el) {
  const [z, sym, nm, en, mass, cat, grp, per, eneg, melt, boil, state, desc] = el;
  const box = document.getElementById('m-box');
  box.className = `m-sym-box ${catClass(cat)}`;
  document.getElementById('m-z').textContent = z;
  document.getElementById('m-sym').textContent = sym;
  document.getElementById('m-ms').textContent = mass;
  document.getElementById('m-name').textContent = nm;
  document.getElementById('m-en').textContent = en;
  const catEl = document.getElementById('m-cat');
  catEl.textContent = CATS[cat]?.label || cat;
  catEl.style.background = CATS[cat]?.color || '#333';
  catEl.style.color = '#fff';

  const stateKo = { solid:'고체', liquid:'액체', gas:'기체', 'unknown-cat':'미확인' };
  const stateClass = { solid:'state-solid', liquid:'state-liquid', gas:'state-gas', 'unknown-cat':'state-unknown' };
  const stateLabel = stateKo[state] || '미확인';

  const props = [
    ['원자번호', z],
    ['원자량', mass],
    ['족 (Group)', grp || '-'],
    ['주기 (Period)', per],
    ['전기음성도', eneg ?? '-'],
    ['녹는점', melt != null ? `${melt} °C` : '-'],
    ['끓는점', boil != null ? `${boil} °C` : '-'],
    ['상온 상태', stateLabel],
  ];

  const grid = document.getElementById('m-grid');
  grid.innerHTML = props.map(([l, v]) =>
    `<div class="m-prop"><div class="pl">${l}</div><div class="pv">${v}</div></div>`
  ).join('');

  document.getElementById('m-desc').textContent = desc;
  document.getElementById('overlay').classList.add('show');
}

function closeModal(e) {
  if (e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('show');
  }
}

// Build legend
const legendDiv = document.getElementById('legend');
Object.entries(CATS).forEach(([key, val]) => {
  if (key === 'unknown-cat') return;
  const item = document.createElement('div');
  item.className = 'leg';
  item.innerHTML = `<div class="leg-box" style="background:${val.color}"></div><span>${val.label}</span>`;
  legendDiv.appendChild(item);
});

// Build grid
const grid = document.getElementById('grid');

// Helper to add empty cell
function addBlank(row, col, cls='') {
  const d = document.createElement('div');
  d.style.gridColumn = col;
  d.style.gridRow = row;
  if (cls) d.className = cls;
  grid.appendChild(d);
}

function addPlaceholder(row, col, text) {
  const d = document.createElement('div');
  d.className = 'placeholder';
  d.style.gridColumn = col;
  d.style.gridRow = row;
  d.textContent = text;
  grid.appendChild(d);
}

// Place elements that have fixed group/period
E.forEach(el => {
  const [z, sym, nm, en, mass, cat, grp, per] = el;
  if (grp === null) return; // lanthanides/actinides - placed separately
  grid.appendChild(makeEl(el, per, grp));
});
