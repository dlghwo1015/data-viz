.live-status { text-align: center; font-size: 0.68em; margin-bottom: 10px; min-height: 18px; color: #666; }
.live-status.ok { color: #44aa66; }
.live-status.err { color: #aa4444; }
.api-info { text-align: center; font-size: 0.65em; color: #445; margin-bottom: 8px; }
.api-info a { color: #558; text-decoration: none; }

.grad-bar { width: 200px; height: 12px; border-radius: 6px; background: linear-gradient(to right, #ff5050, #aa1a1a, #2a2a38, #0d7530, #26e870); }
.leg-label { color: #777; }

/* Chart */

svg { display: block; }

/* Cells — stroke 제거, CSS hover 사용 */

.sector-label { font-size: 10px; font-weight: 600; fill: var(--sector-lbl); text-anchor: middle; dominant-baseline: middle; pointer-events: none; letter-spacing: 0.8px; }

.stock-pct { fill: var(--stock-pct); text-anchor: middle; dominant-baseline: middle; pointer-events: none; }

// ===== Day / Night Theme =====
(function() {
  function detectTheme() {
    const h = new Date().getHours();
    return (h >= 6 && h < 18) ? 'light' : 'dark';
  }
  function applyTheme(mode) {
    if (mode === 'light') {
      document.body.classList.add('light');
      const btn_t = document.getElementById('theme-toggle'); if(btn_t) btn_t.textContent = '🌙';
    } else {
      document.body.classList.remove('light');
      const btn_t = document.getElementById('theme-toggle'); if(btn_t) btn_t.textContent = '☀️';
    }
    window._currentTheme = mode;
    // re-render SVG background if chart already drawn
    const svgBg = getComputedStyle(document.documentElement).getPropertyValue('--svg-bg').trim();
    const svgEl = document.querySelector('#chart svg');
    if (svgEl) svgEl.style.background = svgBg;
  }
  window._applyTheme = applyTheme;
  window._detectTheme = detectTheme;
  // Initial apply
  applyTheme(detectTheme());
  // Auto-check every 60s
  setInterval(function() {
    const newMode = detectTheme();
    if (newMode !== window._currentTheme) applyTheme(newMode);
  }, 60000);
})();

// Simulate daily change with seeded pseudo-random
function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return ((s >>> 0) / 0xffffffff) * 2 - 1;
  };
}

  // bias toward -2 to +3 range, more realistic
  const chg = parseFloat((r * 4.5 - 0.5).toFixed(2));
  return { ticker, name, sector, cap, chg, price: null };
});

  '소비재(임의)':'#3a1a50',
  '소비재(필수)':'#501a3a',
  '금융':'#503a1a',
  '헬스케어':'#1a5030',
  '산업재':'#303a50',
  '에너지':'#503020',
  '리츠':'#2a3a50',
  '유틸리티':'#1a4040',
  '소재':'#3a4020',
};

function pctColor(chg) {
  if (chg >= 5) return '#26e870';
  if (chg >= 3) return '#1dc455';
  if (chg >= 1.5) return '#13993c';
  if (chg >= 0.5) return '#0d7530';
  if (chg >= -0.5) return '#2a2a38';
  if (chg >= -1.5) return '#aa1a1a';
  if (chg >= -3) return '#cc2828';
  if (chg >= -5) return '#ee3838';
  return '#ff5050';
}

let sortBy = 'cap';
function setSortBy(v) {
  sortBy = v;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function render() {
  const container = document.getElementById('chart');
  container.innerHTML = '';
  const W = container.clientWidth || window.innerWidth - 32;
  const H = Math.max(520, window.innerHeight - 220);

  const grouped = {};
  sectorOrder.forEach(s => { grouped[s] = []; });
  data.forEach(d => { if (grouped[d.sector]) grouped[d.sector].push(d); });

  const hierData = {
    name: 'root',
    children: sectorOrder.map(s => ({
      name: s,
      children: grouped[s].sort((a,b) => sortBy === 'cap' ? b.cap - a.cap : Math.abs(b.chg) - Math.abs(a.chg))
    })).filter(s => s.children.length > 0)
  };

  const root = d3.hierarchy(hierData)
    .sum(d => d.children ? 0 : d.cap)
    .sort((a,b) => b.value - a.value);

  d3.treemap()
    .size([W, H])
    .paddingOuter(3)
    .paddingTop(17)
    .paddingInner(1)
    .round(true)(root);

  const svg = d3.select('#chart')
    .append('svg')
    .attr('width', W)
    .attr('height', H)
    .style('background', getComputedStyle(document.documentElement).getPropertyValue('--svg-bg').trim());

  // 텍스트 드롭 섀도 필터 (가독성 향상)
  const defs = svg.append('defs');
  const f = defs.append('filter').attr('id','tshadow').attr('x','-5%').attr('y','-5%').attr('width','110%').attr('height','110%');
  f.append('feDropShadow').attr('dx',0).attr('dy',0).attr('stdDeviation',1.2).attr('flood-color','#000').attr('flood-opacity',0.8);

  // Sector groups
  const sectors = root.children || [];
  sectors.forEach(sector => {
    const bg = sectorColors[sector.data.name] || '#1a1a2a';
    const sw = sector.x1 - sector.x0, sh = sector.y1 - sector.y0;
    // 섹터 전체 배경
    svg.append('rect')
      .attr('x', sector.x0).attr('y', sector.y0)
      .attr('width', sw).attr('height', sh)
      .attr('fill', bg);
    // 헤더 바 (반투명 어두운 띠)
    svg.append('rect')
      .attr('x', sector.x0).attr('y', sector.y0)
      .attr('width', sw).attr('height', 16)
      .attr('fill', 'rgba(0,0,0,0.4)');
    // 섹터 라벨
    svg.append('text')
      .attr('x', sector.x0 + sw / 2)
      .attr('y', sector.y0 + 8)
      .attr('class', 'sector-label')
      .text(sector.data.name.toUpperCase());
  });

  // Stock cells
  const leaves = root.leaves();
  const cell = svg.selectAll('.node')
    .data(leaves)
    .enter().append('g')
    .attr('class', 'node')
    .attr('transform', d => `translate(${d.x0},${d.y0})`);

  cell.append('rect')
    .attr('width', d => Math.max(0, d.x1 - d.x0))
    .attr('height', d => Math.max(0, d.y1 - d.y0))
    .attr('fill', d => pctColor(d.data.chg))
    .on('mousemove', function(event, d) {
      const tip = document.getElementById('tip');
      const sign = d.data.chg >= 0 ? '+' : '';
      const cls = d.data.chg >= 0 ? 'up' : 'dn';
      tip.innerHTML = `
        <div class="sym-row">${d.data.ticker}</div>
        <h3>${d.data.name}</h3>
        <table>
          <tr><td>섹터</td><td>${d.data.sector}</td></tr>
          <tr><td>시가총액</td><td>$${d.data.cap.toLocaleString()}B</td></tr>
          <tr><td>현재가</td><td>${d.data.price != null ? '$' + d.data.price.toFixed(2) : '—'}</td></tr>
          <tr><td>등락률</td><td class="pct ${cls}">${sign}${d.data.chg}%</td></tr>
        </table>
        <div style="margin-top:8px;font-size:0.75em;color:#556;text-align:center;">🔗 클릭 → Yahoo Finance</div>`;
      tip.style.display = 'block';
      const tipW = 220, tipH = 120;
      const x = Math.min(event.clientX + 14, window.innerWidth - tipW - 20);
      const y = Math.min(event.clientY - 14, window.innerHeight - tipH - 20);
      tip.style.left = x + 'px';
      tip.style.top = y + 'px';
    })
    .on('mouseleave', () => { document.getElementById('tip').style.display = 'none'; })
    .on('click', function(event, d) {
      event.stopPropagation();
      const ticker = d.data.ticker.replace(/\s/g, '');
      window.open('https://finance.yahoo.com/quote/' + ticker, '_blank');
    })
    .style('cursor', 'pointer');

  // Text labels
  cell.each(function(d) {
    const w = d.x1 - d.x0, h = d.y1 - d.y0;
    const g = d3.select(this);
    if (w < 20 || h < 14) return;
    const cy = h / 2;
    // clipPath으로 텍스트 셀 영역 밖 넘침 방지
    const clipId = `c${d.data.ticker.replace(/[^a-zA-Z0-9]/g,'')}`;
    g.append('clipPath').attr('id', clipId)
      .append('rect').attr('width', w).attr('height', h);

    if (w >= 36 && h >= 26) {
      const fs = Math.min(Math.max(Math.min(w,h) * 0.22, 9), 14);
      g.append('text').attr('class', 'stock-sym')
        .attr('x', w/2).attr('y', h >= 38 ? cy - 6 : cy)
        .attr('font-size', fs)
        .attr('clip-path', `url(#${clipId})`)
        .attr('filter', 'url(#tshadow)')
        .text(d.data.ticker);
      if (h >= 38) {
        const sign = d.data.chg >= 0 ? '+' : '';
        g.append('text').attr('class', 'stock-pct')
          .attr('x', w/2).attr('y', cy + 7)
          .attr('font-size', Math.min(fs * 0.78, 10))
          .attr('clip-path', `url(#${clipId})`)
          .attr('filter', 'url(#tshadow)')
          .text(`${sign}${d.data.chg}%`);
      }
    } else if (w >= 20 && h >= 14) {
      const fs = Math.min(Math.max(Math.min(w,h) * 0.28, 7), 10);
      g.append('text').attr('class', 'stock-sym')
        .attr('x', w/2).attr('y', cy)
        .attr('font-size', fs)
        .attr('clip-path', `url(#${clipId})`)
        .text(d.data.ticker.length > 4 ? d.data.ticker.slice(0,4) : d.data.ticker);
    }
  });
}

// ── 실시간 데이터 로드 (Yahoo Finance via CORS proxy) ──
async function loadLiveData() {
  const btn = document.getElementById('live-btn');
  const status = document.getElementById('live-status');
  btn.textContent = '⏳ 로딩 중...';
  btn.disabled = true;
  status.className = 'live-status';
  status.textContent = '📡 Yahoo Finance에서 데이터를 가져오는 중...';

  // Yahoo Finance ticker 변환 (특수 케이스)
  const yahooMap = { 'BRK.B':'BRK-B', 'BRK.A':'BRK-A' };
  const toYahoo = t => yahooMap[t] || t;

  const tickers = data.map(d => toYahoo(d.ticker));
  const BATCH = 80;
  const PROXIES = [
    u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
    u => 'https://corsproxy.io/?' + encodeURIComponent(u),
    u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
    u => 'https://thingproxy.freeboard.io/fetch/' + u,
    u => 'https://cors-anywhere.herokuapp.com/' + u,
  ];
  async function fetchJSON(apiUrl) {
    let lastErr;
    for (const mkProxy of PROXIES) {
      try {
        const resp = await fetch(mkProxy(apiUrl), { headers: { 'Accept': 'application/json' } });
        if (resp.ok) return await resp.json();
        lastErr = new Error('HTTP ' + resp.status);
      } catch(e) { lastErr = e; }
    }
    throw lastErr || new Error('모든 프록시 실패');
  }
  const liveCache = {};
  let success = 0;

  try {
    for (let i = 0; i < tickers.length; i += BATCH) {
      const batch = tickers.slice(i, i + BATCH);
      const apiUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${batch.join(',')}&fields=regularMarketChangePercent,marketCap,regularMarketPrice`;
      const json = await fetchJSON(apiUrl);
      (json.quoteResponse?.result || []).forEach(q => {
        liveCache[q.symbol] = {
          chg: parseFloat((q.regularMarketChangePercent ?? 0).toFixed(2)),
          cap: q.marketCap ? q.marketCap / 1e9 : null,
          price: q.regularMarketPrice ?? null
        };
        success++;
      });
      // 딜레이 (과도한 요청 방지)
      if (i + BATCH < tickers.length) await new Promise(r => setTimeout(r, 400));
    }

    // data 배열 업데이트
    data.forEach(d => {
      const yt = toYahoo(d.ticker);
      if (liveCache[yt]) {
        d.chg = liveCache[yt].chg;
        if (liveCache[yt].cap && liveCache[yt].cap > 0) d.cap = liveCache[yt].cap;
      }
    });

    render();
    const now = new Date().toLocaleTimeString('ko-KR');
    status.className = 'live-status ok';
    status.textContent = `✅ ${now} 기준 실시간 데이터 (${success}개 종목 업데이트) · Yahoo Finance`;
    btn.textContent = '🔄 새로고침';
  } catch (err) {
    console.error(err);
    status.className = 'live-status err';
    status.textContent = `⚠️ 데이터 로드 실패: ${err.message} — CORS 프록시가 불안정할 수 있습니다. 아래 대안 참고.`;
    btn.textContent = '🔴 재시도';
  }
  btn.disabled = false;
}

window.addEventListener('resize', render);
render();
</script>
